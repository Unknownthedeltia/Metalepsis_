
    <!DOCTYPE html>
    <html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Unknown Site - Metalepsis</title>
        <style>
            body { margin: 0; overflow: hidden; }
            canvas { display: block; }
        </style>
    </head>
    <body>
    
    <!-- ES Module Shims: Three.jsとGSAPをインポートマップで動作させるために必要 --><script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/",
            "gsap": "https://unpkg.com/gsap@3.12.3/index.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
        import { gsap } from 'gsap';

        let scene, camera, renderer, controls;
        let tesseractLines;
        let shogiPiece; // 将棋の駒
        let kingMaterialUniforms; // Kingのシェーダーマテリアルのuniformsを保持

        // 4Dテッセラクトの頂点 (x, y, z, w)
        // [-1, -1, -1, -1] から [1, 1, 1, 1] までの16頂点
        const vertices4D = [];
        for (let i = 0; i < 16; i++) {
            vertices4D.push(new THREE.Vector4(
                (i & 1) ? 1 : -1, // x
                (i & 2) ? 1 : -1, // y
                (i & 4) ? 1 : -1, // z
                (i & 8) ? 1 : -1  // w
            ));
        }

        // テッセラクトの辺 (頂点インデックスのペア)
        const edges = [
            // w = -1 の立方体
            [0, 1], [2, 3], [0, 2], [1, 3], // 底面
            [4, 5], [6, 7], [4, 6], [5, 7], // 上面
            [0, 4], [1, 5], [2, 6], [3, 7], // 側面
            // w = 1 の立方体
            [8, 9], [10, 11], [8, 10], [9, 11],
            [12, 13], [14, 15], [12, 14], [13, 15],
            [8, 12], [9, 13], [10, 14], [11, 15],
            // 2つの立方体をつなぐ辺 (w軸方向)
            [0, 8], [1, 9], [2, 10], [3, 11],
            [4, 12], [5, 13], [6, 14], [7, 15]
        ];

        // 4D回転の角度 (GSAPでアニメーションさせる)
        const rotationAngles = {
            xy: 0,
            xz: 0,
            xw: 0,
            yz: 0,
            yw: 0,
            zw: 0
        };

        // 4D回転行列を適用するヘルパー
        function rotate4D(v, angle, axis1, axis2) {
            const v1 = v[axis1];
            const v2 = v[axis2];
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);
            v[axis1] = v1 * cos - v2 * sin;
            v[axis2] = v1 * sin + v2 * cos;
        }

        // 4Dベクトルを3Dに射影 (透視投影)
        function project4Dto3D(v4) {
            // w軸からの距離 (カメラ距離のようなもの)
            const wDistance = 4;
            // w = wDistance に投影
            const perspective = wDistance / (wDistance - v4.w);
            
            const projectedVector = new THREE.Vector3(
                v4.x * perspective,
                v4.y * perspective,
                v4.z * perspective
            );
            
            // シーン内でのスケール調整を 1.5 から 2.0 に大きくします
            return projectedVector.multiplyScalar(2.0); 
        }

        function init() {
            // シーン
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);

            // カメラ
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10;

            // レンダラー
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // ライト
            const ambientLight = new THREE.AmbientLight(0x606060, 2);
            scene.add(ambientLight);
            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
            directionalLight1.position.set(1, 1, 1);
            scene.add(directionalLight1);
            const directionalLight2 = new THREE.DirectionalLight(0x00aaff, 1.0);
            directionalLight2.position.set(-1, -1, -1);
            scene.add(directionalLight2);


            // コントロール (マウス操作)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // テッセラクトのジオメトリ
            const lineGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(edges.length * 2 * 3); // 32辺 * 2頂点 * 3座標
            const colors = new Float32Array(edges.length * 2 * 3); // 頂点ごとに色 (RGB)
            lineGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            lineGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3)); // 色属性を追加
            
            const lineMaterial = new THREE.LineBasicMaterial({ 
                vertexColors: true, // 頂点の色を使用する
                linewidth: 2,
                transparent: true,
                opacity: 0.8
            });
            tesseractLines = new THREE.LineSegments(lineGeometry, lineMaterial);
            scene.add(tesseractLines);

            // 将棋の駒 (王)
            createShogiPiece();
            
            // GSAPアニメーション
            startGsapAnimation();

            // ウィンドウリサイズ対応
            window.addEventListener('resize', onWindowResize);

            // アニメーションループ
            animate();
        }

        // 将棋の駒（「Metalepsis_」の3Dテキスト）を作成
        function createShogiPiece() {
            const loader = new FontLoader();
            loader.load('https://cdn.jsdelivr.net/npm/three@0.158.0/examples/fonts/helvetiker_regular.typeface.json', function (font) {
                
                const textGeometry = new TextGeometry('Welcome. this is Unknown site.', { // テキストは'Metalepsis_'のまま
                    font: font,
                    size: 0.7, 
                    height: 0.2,
                    curveSegments: 12,
                    bevelEnabled: true,
                    bevelThickness: 0.03,
                    bevelSize: 0.02,
                    bevelOffset: 0,
                    bevelSegments: 5
                });
                textGeometry.center(); // ジオメトリを中央揃え

                // Kingのカスタムシェーダーマテリアル
                kingMaterialUniforms = {
                    time: { value: 0.0 },
                    lightPosition: { value: new THREE.Vector3(0, 0, 0) } // ダミー
                };

                const kingVertexShader = `
                    uniform float time;
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = (modelMatrix * vec4(position, 1.0)).xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `;

                const kingFragmentShader = `
                    uniform float time;
                    varying vec3 vNormal;
                    varying vec3 vPosition;

                    vec3 hsv2rgb(vec3 c) {
                        vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                        vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                        return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
                    }

                    void main() {
                        // オブジェクトのローカルY座標に基づいたグラデーション
                        float hue = (vPosition.y * 0.2 + time * 0.25) ; // Y座標で色相を変化。時間による変化を速くしました。
                        hue = fract(hue); // 0-1の範囲にクランプ
                        
                        vec3 color = hsv2rgb(vec3(hue, 1.0, 1.0)); // 鮮やかな虹色

                        // ライトの影響を少し加える（簡略化）
                        vec3 lightDir = normalize(vec3(0.5, 0.8, 1.0));
                        float diffuse = max(dot(vNormal, lightDir), 0.0);
                        color *= (0.5 + 0.5 * diffuse); // 環境光と拡散光を模倣

                        gl_FragColor = vec4(color, 1.0);
                    }
                `;

                const kingMaterial = new THREE.ShaderMaterial({
                    uniforms: kingMaterialUniforms,
                    vertexShader: kingVertexShader,
                    fragmentShader: kingFragmentShader,
                    // Three.jsの標準ライトを使用する場合は、以下を設定する
                    // lights: true, 
                    // flatShading: true,
                    // side: THREE.DoubleSide // 両面をレンダリングする場合
                });
                
                shogiPiece = new THREE.Mesh(textGeometry, kingMaterial);
                // 超立方体の拡大に合わせてテキストサイズも 1.5 から 2.0 に調整
                shogiPiece.scale.set(2.0, 2.0, 2.0); 
                scene.add(shogiPiece);

                // 駒のGSAPアニメーション (中央でゆっくり回転)
                gsap.to(shogiPiece.rotation, {
                    y: Math.PI * 2,
                    duration: 15,
                    repeat: -1,
                    ease: 'none'
                });
                gsap.to(shogiPiece.rotation, {
                    x: Math.PI * 0.1,
                    duration: 4,
                    repeat: -1,
                    yoyo: true,
                    ease: 'sine.inOut'
                });
            });
        }
        
        // GSAPでの4D回転アニメーション
        function startGsapAnimation() {
            // 6つの回転面すべてをゆっくりと、異なる速度でアニメーションさせる
            const baseDuration = 20; // 基本の回転時間

            gsap.to(rotationAngles, { xy: Math.PI * 2, duration: baseDuration, repeat: -1, ease: 'none' });
            gsap.to(rotationAngles, { zw: Math.PI * 2, duration: baseDuration * 0.8, repeat: -1, ease: 'none', delay: 2 }); // 少しずらす
            gsap.to(rotationAngles, { xz: Math.PI * 2, duration: baseDuration * 1.2, repeat: -1, ease: 'none', delay: 1 });
            gsap.to(rotationAngles, { yw: Math.PI * 2, duration: baseDuration * 1.1, repeat: -1, ease: 'none', delay: 3 });
            gsap.to(rotationAngles, { xw: Math.PI * 2, duration: baseDuration * 0.9, repeat: -1, ease: 'none' });
            gsap.to(rotationAngles, { yz: Math.PI * 2, duration: baseDuration * 1.3, repeat: -1, ease: 'none', delay: 2.5 });
        }
        
        // HSVをRGBに変換するヘルパー関数 (GLSLと同じロジック)
        // h: 0-1, s: 0-1, v: 0-1
        function hsvToRgb(h, s, v) {
            let r, g, b;
            let i = Math.floor(h * 6);
            let f = h * 6 - i;
            let p = v * (1 - s);
            let q = v * (1 - f * s);
            let t = v * (1 - (1 - f) * s);

            switch (i % 6) {
                case 0: r = v, g = t, b = p; break;
                case 1: r = q, g = v, b = p; break;
                case 2: r = p, g = v, b = t; break;
                case 3: r = p, g = q, b = v; break;
                case 4: r = t, g = p, b = v; break;
                case 5: r = v, g = p, b = q; break;
            }
            return { r, g, b };
        }

        // アニメーションループ
        function animate() {
            requestAnimationFrame(animate);

            // 1. 4D頂点の回転
            const rotatedVertices = [];
            for (let i = 0; i < vertices4D.length; i++) {
                const v = vertices4D[i].clone();

                // 4D回転を適用 (GSAPで変更された角度を使用)
                // (x, y, z, w)
                rotate4D(v, rotationAngles.xy, 'x', 'y');
                rotate4D(v, rotationAngles.xz, 'x', 'z');
                rotate4D(v, rotationAngles.xw, 'x', 'w');
                rotate4D(v, rotationAngles.yz, 'y', 'z');
                rotate4D(v, rotationAngles.yw, 'y', 'w');
                rotate4D(v, rotationAngles.zw, 'z', 'w');

                rotatedVertices.push(v);
            }

            // 2. 3Dへの射影
            const projectedVertices = [];
            for (let i = 0; i < rotatedVertices.length; i++) {
                projectedVertices.push(project4Dto3D(rotatedVertices[i]));
            }

            // 3. Three.jsのジオメトリを更新 (テッセラクトのライン)
            const positions = tesseractLines.geometry.attributes.position.array;
            const colors = tesseractLines.geometry.attributes.color.array; // 色配列を取得

            let positionIndex = 0;
            let colorIndex = 0;
            const numEdges = edges.length;
            const time = performance.now() * 0.0001; // 時間経過で色を変化させる

            for (let i = 0; i < numEdges; i++) {
                const edge = edges[i];
                const v1 = projectedVertices[edge[0]];
                const v2 = projectedVertices[edge[1]];

                positions[positionIndex++] = v1.x;
                positions[positionIndex++] = v1.y;
                positions[positionIndex++] = v1.z;
                positions[positionIndex++] = v2.x;
                positions[positionIndex++] = v2.y;
                positions[positionIndex++] = v2.z;

                // 虹色の計算
                // 各辺に異なる色を割り当てる。時間とともに変化させ、流れるような虹色に。
                const hue1 = (i / numEdges + time * 0.1) % 1;
                const hue2 = ((i + 1) / numEdges + time * 0.1) % 1; 

                const rgb1 = hsvToRgb(hue1, 1, 1);
                const rgb2 = hsvToRgb(hue2, 1, 1);

                colors[colorIndex++] = rgb1.r;
                colors[colorIndex++] = rgb1.g;
                colors[colorIndex++] = rgb1.b;
                colors[colorIndex++] = rgb2.r;
                colors[colorIndex++] = rgb2.g;
                colors[colorIndex++] = rgb2.b;
            }
            tesseractLines.geometry.attributes.position.needsUpdate = true; // ジオメトリ更新を通知
            tesseractLines.geometry.attributes.color.needsUpdate = true;   // 色属性の更新を通知

            // KingのシェーダーUniformを更新 (これでアニメーションします)
            if (kingMaterialUniforms) {
                kingMaterialUniforms.time.value = time;
            }
            
            // コントロールの更新
            controls.update();

            // レンダリング
            renderer.render(scene, camera);
        }

        // ウィンドウリサイズ処理
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
    </body>
    </html>
