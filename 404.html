<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - SYSTEM FAILURE</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glitch-color-1: #0ff;
            --glitch-color-2: #f0f;
            --neon-red: #ff2a2a;
            --bg-color: #050505;
        }

        body {
            font-family: 'Share Tech Mono', 'Zen Kaku Gothic New', monospace;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0; /* JSでフェードイン */
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            mix-blend-mode: hard-light;
            pointer-events: none; /* 背景の操作を邪魔しない */
        }

        .content-inner {
            pointer-events: auto;
            text-align: center;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 42, 42, 0.3);
            box-shadow: 0 0 20px rgba(255, 42, 42, 0.1);
            border-radius: 4px;
            transform: skewX(-2deg);
        }

        /* Glitch Text Effect */
        .glitch-text {
            position: relative;
            color: #fff;
            text-transform: uppercase;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .glitch-text::before {
            color: var(--glitch-color-1);
            z-index: -1;
            transform: translate(-2px, -2px);
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            color: var(--glitch-color-2);
            z-index: -2;
            transform: translate(2px, 2px);
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: polygon(0 2%, 100% 2%, 100% 5%, 0 5%); }
            20% { clip-path: polygon(0 15%, 100% 15%, 100% 15%, 0 15%); }
            40% { clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%); }
            60% { clip-path: polygon(0 1%, 100% 1%, 100% 2%, 0 2%); }
            80% { clip-path: polygon(0 33%, 100% 33%, 100% 5%, 0 5%); }
            100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: polygon(0 20%, 100% 20%, 100% 100%, 0 100%); }
            20% { clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%); }
            40% { clip-path: polygon(0 40%, 100% 40%, 100% 80%, 0 80%); }
            60% { clip-path: polygon(0 80%, 100% 80%, 100% 20%, 0 20%); }
            80% { clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%); }
            100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
        }

        /* Elements Specific Styles */
        .error-code {
            font-size: 10rem;
            line-height: 0.9;
            font-weight: 700;
            text-shadow: 0 0 10px var(--neon-red);
            margin-bottom: 1rem;
            letter-spacing: -5px;
        }

        .message {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #ddd;
            letter-spacing: 2px;
        }

        .description {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 3rem;
            font-weight: bold;
        }

        .home-link {
            position: relative;
            display: inline-block;
            padding: 1.2rem 4rem;
            /* 透過をやめて実体のある色にする */
            background: var(--neon-red);
            color: #000;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 1.5rem;
            font-weight: 800;
            border: 2px solid #fff;
            /* クリップパスを少しシンプルに */
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            /* 強烈な発光 */
            box-shadow: 0 0 20px var(--neon-red), inset 0 0 10px rgba(255,255,255,0.5);
            cursor: pointer;
            pointer-events: auto;
            letter-spacing: 2px;
            /* アニメーション前の初期状態を定義 */
            opacity: 1; 
            transform: scale(1);
        }

        .home-link:hover {
            background: #fff;
            color: var(--neon-red);
            box-shadow: 0 0 50px var(--neon-red), 0 0 20px #fff;
            transform: translateY(-2px);
        }

        .home-link span {
            position: relative;
            z-index: 2;
        }
        
        /* 走査線エフェクト */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .error-code { font-size: 6rem; }
            .content-inner { padding: 1.5rem; width: 90%; }
        }
    </style>
</head>
<body>

    <!-- Three.js Canvas Container -->
    <div id="canvas-container"></div>

    <!-- Retro CRT Scanlines -->
    <div class="scanlines"></div>

    <div class="content-wrapper">
        <div class="content-inner">
            <h1 class="error-code glitch-text" id="errorCode" data-text="404">404</h1>
            
            <div id="textContainer">
                <p class="message" id="message">SYSTEM ERROR: PAGE NOT FOUND</p>
                <div class="h-px w-full bg-red-500 my-4 shadow-[0_0_10px_#ff2a2a]"></div>
                <p class="description glitch-text" id="description" data-text="ざんねん！ありません！">
                    ざんねん！<br>
                    ありません！
                </p>
            </div>

            <a href="index.html" class="home-link" id="homeLink">
                <span class="relative z-10">さっさと帰れ！バカ！</span>
            </a>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ==========================================
        // Three.js Background Animation (Data Storm)
        // ==========================================
        const initThreeJS = () => {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            // Fog for depth
            scene.fog = new THREE.FogExp2(0x050505, 0.002);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Particles
            const geometry = new THREE.BufferGeometry();
            const particlesCount = 2000;
            const posArray = new Float32Array(particlesCount * 3);
            const colorsArray = new Float32Array(particlesCount * 3);

            const color1 = new THREE.Color(0xff2a2a); // Red
            const color2 = new THREE.Color(0x00ffff); // Cyan

            for(let i = 0; i < particlesCount * 3; i+=3) {
                // Spread particles in a wide tunnel
                posArray[i] = (Math.random() - 0.5) * 50;     // x
                posArray[i+1] = (Math.random() - 0.5) * 50;   // y
                posArray[i+2] = (Math.random() - 0.5) * 50;   // z
                
                // Mix colors
                const mixedColor = Math.random() > 0.5 ? color1 : color2;
                colorsArray[i] = mixedColor.r;
                colorsArray[i+1] = mixedColor.g;
                colorsArray[i+2] = mixedColor.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

            // Tech-looking particle material
            const material = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            // Mesh
            const particlesMesh = new THREE.Points(geometry, material);
            scene.add(particlesMesh);

            // Floating Geometric Shapes (Debris)
            const debrisGroup = new THREE.Group();
            const geometryCube = new THREE.IcosahedronGeometry(1, 0);
            const materialWireframe = new THREE.MeshBasicMaterial({ 
                color: 0x333333, 
                wireframe: true,
                transparent: true, 
                opacity: 0.3 
            });

            for (let i = 0; i < 10; i++) {
                const mesh = new THREE.Mesh(geometryCube, materialWireframe);
                mesh.position.set(
                    (Math.random() - 0.5) * 30,
                    (Math.random() - 0.5) * 30,
                    (Math.random() - 0.5) * 30
                );
                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
                const scale = Math.random() * 2 + 0.5;
                mesh.scale.set(scale, scale, scale);
                debrisGroup.add(mesh);
            }
            scene.add(debrisGroup);

            camera.position.z = 15;

            // Mouse Interaction
            let mouseX = 0;
            let mouseY = 0;
            let targetX = 0;
            let targetY = 0;

            const windowHalfX = window.innerWidth / 2;
            const windowHalfY = window.innerHeight / 2;

            document.addEventListener('mousemove', (event) => {
                mouseX = (event.clientX - windowHalfX);
                mouseY = (event.clientY - windowHalfY);
            });

            // Animation Loop
            const clock = new THREE.Clock();

            const animate = () => {
                const elapsedTime = clock.getElapsedTime();

                targetX = mouseX * 0.001;
                targetY = mouseY * 0.001;

                // Smooth camera movement
                particlesMesh.rotation.y += 0.002;
                particlesMesh.rotation.x += 0.001;
                
                debrisGroup.rotation.y -= 0.005;
                debrisGroup.rotation.x -= 0.002;

                // Parallax effect based on mouse
                particlesMesh.rotation.y += 0.05 * (targetX - particlesMesh.rotation.y);
                particlesMesh.rotation.x += 0.05 * (targetY - particlesMesh.rotation.x);

                // Pulse effect on particle size
                material.size = 0.15 + Math.sin(elapsedTime * 3) * 0.05;

                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            };

            animate();

            // Resize handling
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Reveal canvas
            gsap.to(container, { opacity: 1, duration: 2 });
        };

        // ==========================================
        // GSAP UI Animations
        // ==========================================
        const initGSAP = () => {
            const tl = gsap.timeline();

            // Initial chaotic entrance
            tl.from("#errorCode", {
                duration: 1.5,
                scale: 5,
                opacity: 0,
                filter: "blur(20px)",
                ease: "power4.out",
                onUpdate: function() {
                    // Random glitch shake during entrance
                    if(Math.random() > 0.7) {
                        gsap.set("#errorCode", { x: Math.random() * 10 - 5, y: Math.random() * 10 - 5 });
                    }
                }
            })
            .to("#errorCode", { x: 0, y: 0, duration: 0.1 }) // Reset position
            
            .from("#textContainer", {
                y: 50,
                opacity: 0,
                duration: 0.8,
                ease: "power2.out",
                stagger: 0.2
            }, "-=0.5");
            
            // ボタンのアニメーションを独立させて確実に実行する
            // fromToを使って強制的に0から1へアニメーションさせる
            gsap.fromTo("#homeLink", 
                { 
                    opacity: 0, 
                    y: 20,
                    scale: 0.9
                },
                { 
                    opacity: 1, 
                    y: 0, 
                    scale: 1,
                    duration: 0.5,
                    delay: 1.5, // 他のアニメーションが終わった頃に出現
                    ease: "back.out(1.7)"
                }
            );

            // Interactive Button Animation
            const btn = document.getElementById('homeLink');
            
            btn.addEventListener('mouseenter', () => {
                gsap.to(btn, {
                    x: () => Math.random() * 10 - 5,
                    y: () => Math.random() * 10 - 5,
                    rotation: () => Math.random() * 10 - 5,
                    duration: 0.1,
                    repeat: 5,
                    yoyo: true,
                    ease: "rough({ template: none.out, strength: 1, points: 20, taper: 'none', randomize: true, clamp: false})"
                });
            });

            btn.addEventListener('mouseleave', () => {
                gsap.to(btn, { x: 0, y: 0, rotation: 0, duration: 0.2 });
            });

            // Constant ambient glitch for the 404 text
            gsap.to("#errorCode", {
                textShadow: "2px 0 #0ff, -2px 0 #f00",
                repeat: -1,
                yoyo: true,
                duration: 0.1,
                ease: "steps(2)",
                onRepeat: () => {
                    if (Math.random() > 0.9) {
                        gsap.set("#errorCode", { opacity: Math.random() });
                    } else {
                        gsap.set("#errorCode", { opacity: 1 });
                    }
                }
            });
        };

        // Initialize everything on load
        window.onload = function() {
            initThreeJS();
            initGSAP();
        };

    </script>
</body>
</html>
